sonar.projectKey=Interview-backend
sonar.projectName=Interview-backend
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Analyze only Python files
sonar.inclusions=**/*.py

# Exclude typical dirs
sonar.exclusions=**/venv/**,**/__pycache__/**,**/.pytest_cache/**

# Coverage (pytest-cov produces this)
sonar.python.coverage.reportPaths=coverage.xml
